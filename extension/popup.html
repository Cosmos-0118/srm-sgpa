<!DOCTYPE html>

  <title>srmcgpa</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="popup-header">
    <img src="icons/logo.jpeg" alt="srmcgpa logo" class="popup-logo">
    <div class="popup-brand">
      <h1>srmcgpa</h1>
      <p>SGPA / CGPA Calculator</p>
    </div>
  </header>

  <section class="popup-toggle-section">
    <div class="toggle-row">
      <div>
        <span class="toggle-label">Extension</span>
        <span class="toggle-status" id="status-text">On</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="extension-toggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <p class="toggle-hint" id="toggle-hint">Calculator is active on the SRM portal.</p>
  </section>

  <nav class="popup-links">
    <a href="privacy-policy.html" target="_blank" rel="noopener">Privacy Policy</a>
    <span class="link-divider">·</span>
    <a href="terms-of-service.html" target="_blank" rel="noopener">Terms of Service</a>

  <footer class="popup-footer">
    <p>&copy; 2026 <strong>srmcgpa</strong>. All rights reserved.</p>
    <p class="footer-note">Unofficial tool — not affiliated with SRMIST.</p>
  </footer>

  <script src="popup.js"></script>

</html>
