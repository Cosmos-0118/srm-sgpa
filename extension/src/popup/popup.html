<body>

    <div class="header-left">
      <img src="../../assets/icons/logo.jpeg" alt="srmsgpa logo" class="popup-logo">
      <div class="popup-brand">
        <h1>srmsgpa</h1>
        <p>SGPA Calculator</p>
      </div>
    </div>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-sun" id="icon-sun"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>

    </button>
  </header>

  <main class="popup-main">
    <section class="popup-toggle-section card">
      <div class="toggle-row">
        <div>
          <span class="toggle-label">Extension Status</span>
          <span class="toggle-status" id="status-text">Active</span>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="extension-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <p class="toggle-hint" id="toggle-hint">Calculator is active on the SRM portal.</p>
    </section>

    <nav class="popup-links card">
      <a href="../../assets/legal/privacy-policy.html" target="_blank" rel="noopener">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        Privacy Policy
      </a>
      <span class="link-divider"></span>
      <a href="../../assets/legal/terms-of-service.html" target="_blank" rel="noopener">
